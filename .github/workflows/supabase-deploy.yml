# Supabase Deploy — Edge Functions + Migrations
# Badge: ![Supabase Deploy](https://github.com/rotprods/ANTIGRAVITY-OS/actions/workflows/supabase-deploy.yml/badge.svg)

name: Deploy Supabase

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'

concurrency:
  group: supabase-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-migrations:
    name: Deploy Migrations
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits.*.modified), 'supabase/migrations') ||
      contains(toJson(github.event.commits.*.added), 'supabase/migrations')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy migrations
        run: supabase db push --project-ref yxzdafptqtcvpsbqkmkm
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits.*.modified), 'supabase/functions') ||
      contains(toJson(github.event.commits.*.added), 'supabase/functions')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy functions
        run: supabase functions deploy --project-ref yxzdafptqtcvpsbqkmkm
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
